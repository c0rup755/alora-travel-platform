<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Alora | Smart Travel Planner</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
    }
  </style>
  <!-- TravelPayouts script; set REACT_APP_TP_SCRIPT_URL in Vercel (e.g. https://tp-em.com/NTAzNDU0.js?t=503454) -->
  <script>
    (function(){
      try {
        var tpUrl = "%REACT_APP_TP_SCRIPT_URL%".trim();
        // If the env variable was not provided at build time it will remain as the literal placeholder
        var isPlaceholder = tpUrl.indexOf('%') !== -1 || tpUrl === '';
        if (!isPlaceholder) {
          var s = document.createElement('script');
          s.async = true;
          s.setAttribute('data-noptimize', '1');
          s.setAttribute('data-cfasync', 'false');
          s.src = tpUrl;
          document.head.appendChild(s);
        }
      } catch (err) {
        console.warn('TP script injection skipped', err);
      }
    })();
  </script>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/index.jsx"></script>
</body>
</html>
