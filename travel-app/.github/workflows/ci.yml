name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install backend deps
        run: |
          cd backend
          npm ci

      - name: Start backend
        run: |
          nohup node backend/server.js > backend.log 2>&1 &
          sleep 1

      - name: Wait for backend health
        run: |
          n=0
          until curl -sSf http://localhost:5000/health >/dev/null 2>&1 || [ $n -gt 30 ]; do n=$((n+1)); sleep 1; done
          if [ $n -gt 30 ]; then cat backend.log; exit 1; fi

      - name: Install frontend deps
        run: |
          cd frontend
          npm ci

      - name: Build frontend
        run: |
          cd frontend
          npm run build

      - name: Serve frontend build
        run: |
          npx serve -s frontend/build -l 3000 > frontend.log 2>&1 &
          n=0
          until curl -sSf http://localhost:3000/ >/dev/null 2>&1 || [ $n -gt 30 ]; do n=$((n+1)); sleep 1; done
          if [ $n -gt 30 ]; then cat frontend.log; exit 1; fi

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run API E2E script
        env:
          API_BASE: http://localhost:5000/api
        run: node scripts/e2e-api.js

      - name: Run Playwright UI tests
        env:
          API_BASE: http://localhost:5000/api
          APP_URL: http://localhost:3000
        run: npx playwright test tests/ui/e2e.spec.js --reporter=list
